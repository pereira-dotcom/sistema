          <script>
               //Al cargarse la página---------------------------------------------------------------------------
               //Control de seguridad en la apertura de la página------------------------------------------------
               var nom = localStorage.getItem("nomUsuario");
               if (nom == "" || nom == null){
                    window.location.href = "error.html"; // Redirige al login
               }
               //Fin del Control de seguridad en la apertura de la página----------------------------------------
               
               //------------------------------------------------------------------------------------------------
               // 1. SIMULACIÓN DE BASE DE DATOS CON LOCALSTORAGE
               // Recuperar el array de objetos 'usuarios' desde localStorage. 
               // Si no existe (es null), usamos un array vacío [] gracias al operador lógico ||
               var usuarios = JSON.parse(localStorage.getItem("usuarios")) || [];

               let tabla;
               // 2. INSTANCIAS DE COMPONENTES BOOTSTRAP
               // Inicializamos los modales de Bootstrap en variables para poder abrirlos (show) y cerrarlos (hide) desde JavaScript
               const modalNUsuario = new bootstrap.Modal(document.getElementById('modalNuevoUsuario'));

               document.addEventListener('DOMContentLoaded', function () {
                    // Llamada a la función que inyecta el menú (ubicada en js/funcionesSistema.js)
                    // Esto evita tener que copiar y pegar todo el HTML del menú en cada página.
                    cargarComponentes();
                    cargarTablaUsuarios();

                    //Evento para Nuevo Usuario----------------------------------------------------------
                    // 3. CAPTURAR EL ENVÍO DEL FORMULARIO (SUBMIT)
                    document.getElementById('formNuevoUsuario').addEventListener('submit', function (e) {
                         // Usamos preventDefault() para evitar que la página se recargue (comportamiento por defecto de los formularios)
                         e.preventDefault();

                         const nuevoUsuario = {
                              idusuario: obtenerSiguienteId(usuarios),
                              cedula: document.getElementById('cedula').value.trim(),
                              nombre: document.getElementById('nombre').value.trim().toUpperCase(),
                              celular: document.getElementById('celular').value.trim(),
                              usuario: document.getElementById('txtusuario').value.trim(),
                              contrasena: document.getElementById('contrasena').value.trim(),
                              rol: document.getElementById('rol').value.trim()
                         };

                         if (Object.values(nuevoUsuario).some(val => val === '')) {
                              alertify.error('Todos los campos son obligatorios');
                              return;
                         }

                         const usuarioExistente = usuarios.find(u => u.usuario === nuevoUsuario.usuario);
                         if (usuarioExistente) {
                              alertify.error('El nombre de usuario ya existe');
                              return;
                         }

                         usuarios.push(nuevoUsuario);
                         guardarUsuarios(usuarios);
                         this.reset();
                         tabla.row.add(nuevoUsuario).draw();
                         modalNUsuario.hide();
                         alertify.success("Registro guardado");
                    });

                 
                    const modalEUsuario = new bootstrap.Modal(document.getElementById('modalEditarUsuario'));
                    // Evento para botón editar--------------------------------------------------------------
                    // 4. DELEGACIÓN DE EVENTOS (EVENT DELEGATION)
                    // Como los botones de "Editar" y "Eliminar" son creados dinámicamente por el DataTable, no podemos asignarles 
                    // un EventListener directo al cargar la página. Por eso, escuchamos los clics en TODO el 'document' y 
                    // verificamos si el elemento clickeado (e.target) corresponde a nuestro botón.
                    document.addEventListener('click', function (e) {
                         if (e.target.closest('.btn-editar')) {
                              const id = parseInt(e.target.closest('.btn-editar').dataset.id);
                              const usuario = usuarios.find(u => u.idusuario === id);
                              if (usuario) {
                                   document.getElementById('edit_idusuario').value = usuario.idusuario;
                                   document.getElementById('edit_cedula').value = usuario.cedula;
                                   document.getElementById('edit_nombre').value = usuario.nombre;
                                   document.getElementById('edit_celular').value = usuario.celular;
                                   document.getElementById('edit_usuario').value = usuario.usuario;
                                   document.getElementById('edit_contrasena').value = usuario.contrasena;
                                   document.getElementById('edit_rol').value = usuario.rol;
                                   modalEUsuario.show();
                              }
                         }
                    });

                    // Guardar cambios al editar-----------------------------------------------------------
                    document.getElementById('formEditarUsuario').addEventListener('submit', function (e) {
                         e.preventDefault();
                         const id = parseInt(document.getElementById('edit_idusuario').value);
                         const index = usuarios.findIndex(u => u.idusuario === id);
                         if (index !== -1) { //Si el usuario existe dentro de la lista
                              usuarios[index] = {
                                   idusuario: id,
                                   cedula: document.getElementById('edit_cedula').value.trim(),
                                   nombre: document.getElementById('edit_nombre').value.trim().toUpperCase(),
                                   celular: document.getElementById('edit_celular').value.trim(),
                                   usuario: document.getElementById('edit_usuario').value.trim(),
                                   contrasena: document.getElementById('edit_contrasena').value.trim(),
                                   rol: document.getElementById('edit_rol').value.trim()
                              };
                              guardarUsuarios(usuarios);
                              tabla.clear().rows.add(usuarios).draw();
                              modalEUsuario.hide();
                              alertify.success("Usuario actualizado");
                              //.clear(): Borra todo el contenido actual de la tabla
                              //.rows.add(usuarios): Toma el nuevo array usuarios y lo carga en la tabla
                              //.draw(): Renderiza los cambios. Sin esto, la tabla se quedaría en blanco o no mostraría los cambios
                         }
                    });

                    const modalDelUsuario = new bootstrap.Modal(document.getElementById('modalEliminarUsuario'));

                    // Evento para botón eliminar (Abre el modal)
                    document.addEventListener('click', function (e) {
                         if (e.target.closest('.btn-eliminar')) {
                              const id = parseInt(e.target.closest('.btn-eliminar').dataset.id);
                              const usuario = usuarios.find(u => u.idusuario === id);
                              if (usuario) {
                                   document.getElementById('del_idusuario').value = usuario.idusuario;
                                   document.getElementById('del_cedula').textContent = usuario.cedula;
                                   document.getElementById('del_nombre').textContent = usuario.nombre;
                                   document.getElementById('del_celular').textContent = usuario.celular;
                                   document.getElementById('del_usuario').textContent = usuario.usuario;
                                   document.getElementById('del_rol').textContent = usuario.rol;
                                   modalDelUsuario.show();
                              }
                         }
                    });

                    // Evento para el botón eliminar dentro del modal (Ejecuta Alertify)
                    document.getElementById('btnConfirmarEliminar').addEventListener('click', function() {
                         const id = parseInt(document.getElementById('del_idusuario').value);
                         alertify.confirm("Eliminar usuario", "¿Realmente deseas eliminar de forma permanente a este usuario?",
                              function(){
                                   usuarios = usuarios.filter(u => u.idusuario !== id);
                                   guardarUsuarios(usuarios);
                                   tabla.clear().rows.add(usuarios).draw();
                                   modalDelUsuario.hide();
                                   alertify.success("Usuario eliminado correctamente");
                              },
                              function(){
                                   modalDelUsuario.hide();
                                   alertify.error("Eliminación cancelada");
                              }
                         ).set('labels', {ok:'Sí, eliminar', cancel:'No, mantener'});
                    });
               });
               //------------------------------------------------------------------------------
               function cargarTablaUsuarios(){
                    // Inicializar el DataTable
                    tabla = new DataTable("#tabla_usuarios", {
                         data: usuarios,
                         columns: [
                              { data: 'idusuario', title: 'Id Usuario' },
                              { data: 'cedula', title: 'N° Cédula' },
                              { data: 'nombre', title: 'Nombre' },
                              { data: 'celular', title: 'Celular' },
                              { data: 'usuario', title: 'Usuario' },
                              { data: 'contrasena', title: 'Contraseña' },
                              { data: 'rol', title: 'Rol' },
                              {
                                   data: null,
                                   render: function (data, type, row) {
                                   return `
                                        <button class="btn btn-sm btn-warning me-1 btn-editar" 
                                        data-id="${row.idusuario}"><i class="bi bi-pencil-square"></i>
                                        </button>
                                        <button class="btn btn-sm btn-danger btn-eliminar" 
                                        data-id="${row.idusuario}"><i class="bi bi-trash">
                                        </i></button>
                                   `;
                                   }
                              }
                         ],
                         dom: 'Bfrtip',
                         buttons: [
                              {
                                   extend: 'print',
                                   text: '<i class="bi bi-printer"></i> Imprimir'
                              },
                              {
                                   extend: 'excelHtml5',
                                   text: '<i class="bi bi-filetype-xlsx"></i> Exportar a Excel'
                              },
                              {
                                   extend: 'pdfHtml5',
                                   text: '<i class="bi bi-filetype-pdf"></i> Exportar a PDF',
                                   exportOptions: {
                                        columns: [0, 1, 2, 3, 4, 5, 6] // Excluye columna de acciones (índice 6)
                                   },
                                   customize: function (doc) {
                                        // 1. Obtener fecha y hora en formato dd/MM/aaaa HH:mm:ss
                                        const now = new Date();
                                        const fecha = now.toLocaleDateString('es-PY', { day: '2-digit', month: '2-digit', year: 'numeric' });
                                        const hora = now.toLocaleTimeString('es-PY', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false });
                                        const fechaHora = fecha + ' ' + hora;

                                        // 2. Configurar el pie de página (footer) del documento PDF
                                        doc.footer = function(currentPage, pageCount) {
                                             return {
                                                  columns: [
                                                       {
                                                            alignment: 'left',
                                                            text: fechaHora,
                                                            margin: [20, 10], // Margen: [Izquierda/Derecha, Arriba/Abajo]
                                                            fontSize: 8
                                                       },
                                                       {
                                                            alignment: 'right',
                                                            text: 'Pág. ' + currentPage.toString() + '/' + pageCount.toString(),
                                                            margin: [20, 10],
                                                            fontSize: 8
                                                       }
                                                  ]
                                             };
                                        };

                                        // Verifica si `content` tiene una tabla definida
                                        for (let i = 0; i < doc.content.length; i++) {
                                             if (doc.content[i].table !== undefined) {
                                                  const tableNode = doc.content[i];

                                                  // Si hay body, ajustamos los anchos
                                                  if (tableNode.table.body && tableNode.table.body.length > 0) {
                                                       // 'auto' se ajusta al tamaño del contenido (como la cabecera)
                                                       // '*' toma todo el espacio sobrante (ideal para el Nombre)
                                                       tableNode.table.widths = ['auto', 'auto', '*', 'auto', 'auto', 'auto'];
                                                  }

                                                  break; // salimos del loop luego de encontrar la tabla
                                             }
                                        }
                                   }
                              },
                              {
                                   text: '<i class="bi bi-file-earmark-plus"></i> Nuevo usuario',
                                   className: 'btn btn-sm btn-primary',
                                   action: function (e, dt, node, config) {
                                        // Abrir un modal para crear un nuevo usuario
                                        $('#modalNuevoUsuario').modal('show');
                                   }
                              }
                         ],
                         responsive: true,
                         language: {
                              url: 'dt/es-ES.js'
                         },
                         initComplete: function () {
                              // Aplicar clases de Bootstrap a los botones
                              const buttons = document.querySelectorAll('.dt-button');
                              buttons.forEach(btn => {
                                   btn.classList.remove('dt-button');
                                   if (btn.textContent.includes('usuario')) {
                                        btn.classList.add('btn', 'btn-sm', 'btn-primary');
                                   } else if (btn.textContent.includes('Imprimir')) {
                                        btn.classList.add('btn', 'btn-sm', 'btn-info');
                                   } else if (btn.textContent.includes('Excel')) {
                                        btn.classList.add('btn', 'btn-sm', 'btn-success');
                                   } else if (btn.textContent.includes('PDF')) {
                                        btn.classList.add('btn', 'btn-sm', 'btn-danger');
                                   }
                              });
                         }
                    });
                    //tabla.column(5).visible(false); //Ocultar la columna contraseña
               }
               //------------------------------------------------------------------------------
               function guardarUsuarios(data) {
                    localStorage.setItem('usuarios', JSON.stringify(data));
               }
               //------------------------------------------------------------------------------
               function obtenerSiguienteId(usuarios) {
                    if (usuarios.length === 0){
                         return 1;
                    }else{
                         const maxId = Math.max(...usuarios.map(u => u.idusuario || 0));
                         return maxId + 1;
                    }
               }
               //------------------------------------------------------------------------------
          </script>
