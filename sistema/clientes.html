    <!-- Modal Eliminar Cliente -->
    <div class="modal fade" id="modalEliminarCliente" tabindex="-1"
    aria-labelledby="modalEliminarClienteLabel" aria-hidden="true" data-bs-backdrop="static">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-danger text-white">
                        <h5 class="modal-title" id="modalEliminarClienteLabel"><i class="bi bi-exclamation-triangle-fill"></i> Eliminar Cliente</h5>

                <div class="modal-body">

        <script>
            //Al cargarse la página---------------------------------------------------------------------------
            //Control de seguridad en la apertura de la página------------------------------------------------
            var nom = localStorage.getItem("nomUsuario");
            if (nom == "" || nom == null){
                window.location.href = "error.html"; // Redirige al login
            }
            //Fin del Control de seguridad en la apertura de la página----------------------------------------
            
            //------------------------------------------------------------------------------------------------
            // 1. SIMULACIÓN DE BASE DE DATOS CON LOCALSTORAGE
            // Recuperar el array de objetos 'clientes' desde localStorage. 
            // Si no existe (es null), usamos un array vacío [] gracias al operador lógico ||
            var clientes = JSON.parse(localStorage.getItem("clientes")) || [];

            let tabla;
            // 2. INSTANCIAS DE COMPONENTES BOOTSTRAP
            // Inicializamos los modales de Bootstrap en variables para poder abrirlos (show) y cerrarlos (hide) desde JavaScript
            const modalNCliente = new bootstrap.Modal(document.getElementById('modalNuevoCliente'));

            document.addEventListener('DOMContentLoaded', function () {
                // Llamada a la función que inyecta el menú (ubicada en js/funcionesSistema.js)
                // Esto evita tener que copiar y pegar todo el HTML del menú en cada página.
                cargarComponentes();
                cargarTablaClientes();

                //Evento para Nuevo Cliente----------------------------------------------------------
                // 3. CAPTURAR EL ENVÍO DEL FORMULARIO (SUBMIT)
                document.getElementById('formNuevoCliente').addEventListener('submit', function (e) {
                        // Usamos preventDefault() para evitar que la página se recargue (comportamiento por defecto de los formularios)
                        e.preventDefault();

                        const nuevoCliente = {
                            idcliente: obtenerSiguienteId(clientes),
                            cedula: document.getElementById('cedula').value.trim(),
                            nombre: document.getElementById('nombre').value.trim().toUpperCase(),
                            celular: document.getElementById('celular').value.trim(),
                            direccion: document.getElementById('direccion').value.trim(),
                            ciudad: document.getElementById('ciudad').value.trim()
                        };

                        if (Object.values(nuevoCliente).some(val => val === '')) {
                            alertify.error('Todos los campos son obligatorios');
                            return;
                        }

                        const clienteExistente = clientes.find(c => c.cedula === nuevoCliente.cedula);
                        if (clienteExistente) {
                            alertify.error('La cédula ya está registrada');
                            return;
                        }

                        clientes.push(nuevoCliente);
                        guardarClientes(clientes);
                        this.reset();
                        tabla.row.add(nuevoCliente).draw();
                        modalNCliente.hide();
                        alertify.success("Registro guardado");
                });

                
                const modalECliente = new bootstrap.Modal(document.getElementById('modalEditarCliente'));
                // Evento para botón editar--------------------------------------------------------------
                // 4. DELEGACIÓN DE EVENTOS (EVENT DELEGATION)
                // Como los botones de "Editar" y "Eliminar" son creados dinámicamente por el DataTable, no podemos asignarles 
                // un EventListener directo al cargar la página. Por eso, escuchamos los clics en TODO el 'document' y 
                // verificamos si el elemento clickeado (e.target) corresponde a nuestro botón.
                document.addEventListener('click', function (e) {
                        if (e.target.closest('.btn-editar')) {
                            const id = parseInt(e.target.closest('.btn-editar').dataset.id);
                            const cliente = clientes.find(c => c.idcliente === id);
                            if (cliente) {
                                document.getElementById('edit_idcliente').value = cliente.idcliente;
                                document.getElementById('edit_cedula').value = cliente.cedula;
                                document.getElementById('edit_nombre').value = cliente.nombre;
                                document.getElementById('edit_celular').value = cliente.celular;
                                document.getElementById('edit_direccion').value = cliente.direccion;
                                document.getElementById('edit_ciudad').value = cliente.ciudad;
                                
                                modalECliente.show();
                            }
                        }
                });

                // Guardar cambios al editar-----------------------------------------------------------
                document.getElementById('formEditarCliente').addEventListener('submit', function (e) {
                        e.preventDefault();
                        const id = parseInt(document.getElementById('edit_idcliente').value);
                        const index = clientes.findIndex(c => c.idcliente === id);
                        if (index !== -1) { //Si el cliente existe dentro de la lista
                            clientes[index] = {
                                idcliente: id,
                                cedula: document.getElementById('edit_cedula').value.trim(),
                                nombre: document.getElementById('edit_nombre').value.trim().toUpperCase(),
                                celular: document.getElementById('edit_celular').value.trim(),
                                direccion: document.getElementById('edit_direccion').value.trim(),
                                ciudad: document.getElementById('edit_ciudad').value.trim()
                            };
                            guardarClientes(clientes);
                            tabla.clear().rows.add(clientes).draw();
                            modalECliente.hide();
                            alertify.success("Cliente actualizado");
                            //.clear(): Borra todo el contenido actual de la tabla
                            //.rows.add(clientes): Toma el nuevo array clientes y lo carga en la tabla
                            //.draw(): Renderiza los cambios. Sin esto, la tabla se quedaría en blanco o no mostraría los cambios
                        }
                });

                const modalDelCliente = new bootstrap.Modal(document.getElementById('modalEliminarCliente'));

                // Evento para botón eliminar (Abre el modal)
                document.addEventListener('click', function (e) {
                        if (e.target.closest('.btn-eliminar')) {
                            const id = parseInt(e.target.closest('.btn-eliminar').dataset.id);
                            const cliente = clientes.find(c => c.idcliente === id);
                            if (cliente) {
                                document.getElementById('del_idcliente').value = cliente.idcliente;
                                document.getElementById('del_cedula').textContent = cliente.cedula;
                                document.getElementById('del_nombre').textContent = cliente.nombre;
                                document.getElementById('del_celular').textContent = cliente.celular;
                                document.getElementById('del_direccion').textContent = cliente.direccion;
                                document.getElementById('del_ciudad').textContent = cliente.ciudad;
                                modalDelCliente.show();
                            }
                        }
                });

                // Evento para el botón eliminar dentro del modal (Ejecuta Alertify)
                document.getElementById('btnConfirmarEliminar').addEventListener('click', function() {
                        const id = parseInt(document.getElementById('del_idcliente').value);
                        alertify.confirm("Eliminar cliente", "¿Realmente deseas eliminar de forma permanente a este cliente?",
                            function(){
                                clientes = clientes.filter(c => c.idcliente !== id);
                                guardarClientes(clientes);
                                tabla.clear().rows.add(clientes).draw();
                                modalDelCliente.hide();
                                alertify.success("Cliente eliminado correctamente");
                            },
                            function(){
                                modalDelCliente.hide();
                                alertify.error("Eliminación cancelada");
                            }
                        ).set('labels', {ok:'Sí, eliminar', cancel:'No, mantener'});
                });
            });
            //------------------------------------------------------------------------------
            function cargarTablaClientes(){
                // Inicializar el DataTable
                tabla = new DataTable("#tabla_clientes", {
                        data: clientes,
                        columns: [
                            { data: 'idcliente', title: 'Id Cliente' },
                            { data: 'cedula', title: 'N° Cédula' },
                            { data: 'nombre', title: 'Nombre' },
                            { data: 'celular', title: 'Celular' },
                            { data: 'direccion', title: 'Dirección' },
                            { data: 'ciudad', title: 'Ciudad' },
                            {
                                data: null,
                                render: function (data, type, row) {
                                return `
                                    <button class="btn btn-sm btn-warning me-1 btn-editar" 
                                    data-id="${row.idcliente}"><i class="bi bi-pencil-square"></i>
                                    </button>
                                    <button class="btn btn-sm btn-danger btn-eliminar" 
                                    data-id="${row.idcliente}"><i class="bi bi-trash">
                                    </i></button>
                                `;
                                }
                            }
                            
                        ],
                        dom: 'Bfrtip',
                        buttons: [
                            {
                                extend: 'print',
                                text: '<i class="bi bi-printer"></i> Imprimir',
                                exportOptions: {
                                    columns: [0, 1, 2, 3, 4, 5] // Excluye columna de acciones (índice 7)
                                }
                            },
                            {
                                extend: 'excelHtml5',
                                text: '<i class="bi bi-filetype-xlsx"></i> Exportar a Excel',
                                exportOptions: {
                                    columns: [0, 1, 2, 3, 4, 5] // Excluye columna de acciones (índice 7)
                                }

                            },
                            {
                                extend: 'pdfHtml5',
                                text: '<i class="bi bi-filetype-pdf"></i> Exportar a PDF',
                                exportOptions: {
                                    columns: [0, 1, 2, 3, 4, 5] // Excluye columna de acciones (índice 7)
                                },
                                customize: function (doc) {
                                    // 1. Obtener fecha y hora en formato dd/MM/aaaa HH:mm:ss
                                    const now = new Date();
                                    const fecha = now.toLocaleDateString('es-PY', { day: '2-digit', month: '2-digit', year: 'numeric' });
                                    const hora = now.toLocaleTimeString('es-PY', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false });
                                    const fechaHora = fecha + ' ' + hora;

                                    // 2. Configurar el pie de página (footer) del documento PDF
                                    doc.footer = function(currentPage, pageCount) {
                                            return {
                                                columns: [
                                                    {
                                                        alignment: 'left',
                                                        text: fechaHora,
                                                        margin: [20, 10], // Margen: [Izquierda/Derecha, Arriba/Abajo]
                                                        fontSize: 8
                                                    },
                                                    {
                                                        alignment: 'right',
                                                        text: 'Pág. ' + currentPage.toString() + '/' + pageCount.toString(),
                                                        margin: [20, 10],
                                                        fontSize: 8
                                                    }
                                                ]
                                            };
                                    };

                                    // Verifica si `content` tiene una tabla definida
                                    for (let i = 0; i < doc.content.length; i++) {
                                            if (doc.content[i].table !== undefined) {
                                                const tableNode = doc.content[i];

                                                // Si hay body, ajustamos los anchos
                                                if (tableNode.table.body && tableNode.table.body.length > 0) {
                                                    // 'auto' se ajusta al tamaño del contenido (como la cabecera)
                                                    // '*' toma todo el espacio sobrante (ideal para el Nombre)
                                                    tableNode.table.widths = [ 'auto', 'auto', '*', 'auto', 'auto', 'auto'];
                                                }

                                                break; // salimos del loop luego de encontrar la tabla
                                            }
                                    }
                                }
                            },
                            {
                                text: '<i class="bi bi-file-earmark-plus"></i> Nuevo cliente',
                                className: 'btn btn-sm btn-primary',
                                action: function (e, dt, node, config) {
                                    // Abrir un modal para crear un nuevo cliente
                                    $('#modalNuevoCliente').modal('show');
                                }
                            }
                        ],
                        responsive: true,
                        language: {
                            url: 'dt/es-ES.js'
                        },
                        initComplete: function () {
                            // Aplicar clases de Bootstrap a los botones
                            const buttons = document.querySelectorAll('.dt-button');
                            buttons.forEach(btn => {
                                btn.classList.remove('dt-button');
                                if (btn.textContent.includes('cliente')) {
                                    btn.classList.add('btn', 'btn-sm', 'btn-primary');
                                } else if (btn.textContent.includes('Imprimir')) {
                                    btn.classList.add('btn', 'btn-sm', 'btn-info');
                                } else if (btn.textContent.includes('Excel')) {
                                    btn.classList.add('btn', 'btn-sm', 'btn-success');
                                } else if (btn.textContent.includes('PDF')) {
                                    btn.classList.add('btn', 'btn-sm', 'btn-danger');
                                }
                            });
                            // tabla.column(4).visible(false); //Ocultar la columna de Usuario
                            // tabla.column(5).visible(false); //Ocultar la columna contraseña
                            // tabla.column(7).orderable(false); //Deshabilitar ordenamiento en la columna de acciones
                        }
                });
                
            }
            //------------------------------------------------------------------------------
            function guardarClientes(data) {
                localStorage.setItem('clientes', JSON.stringify(data));
            }
            //------------------------------------------------------------------------------
            function obtenerSiguienteId(clientes) {
                if (clientes.length === 0){
                        return 1;
                }else{
                        const maxId = Math.max(...clientes.map(c => c.idcliente || 0));
                        return maxId + 1;
                }
            }
            //------------------------------------------------------------------------------
        </script>
